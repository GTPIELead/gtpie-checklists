<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GT Pie Daily Checklists</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1B2C48;
  --blue: #7BBDE1;
  --light-blue: #BBD9EE;
  --white: #FFFFFF;
  --off-white: #F5F7FA;
  --gray-100: #F0F2F5;
  --gray-200: #E2E6EC;
  --gray-400: #9AA3B0;
  --gray-600: #5A6478;
  --green: #2ECC71;
  --green-light: #EAFAF1;
  --red: #E74C3C;
  --red-light: #FDEDEC;
  --yellow-light: #FEF9EC;
  --shadow-sm: 0 1px 3px rgba(27,44,72,0.08);
  --shadow-md: 0 4px 12px rgba(27,44,72,0.12);
  --shadow-lg: 0 8px 24px rgba(27,44,72,0.16);
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--off-white); color: var(--navy); min-height: 100vh; max-width: 430px; margin: 0 auto; }

.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* SPLASH */
#splash { background: var(--navy); align-items: center; justify-content: center; padding: 32px 24px; }
.splash-logo { width: 320px; height: 320px; background: none; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
.splash-logo svg { width: 320px !important; height: 320px !important; max-width: 100%; }
.splash-title { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--white); text-align: center; line-height: 1.2; margin-bottom: 4px; }
.splash-sub { font-size: 13px; color: var(--light-blue); text-align: center; margin-bottom: 32px; letter-spacing: 0.5px; }
.login-card { background: var(--white); border-radius: var(--radius); padding: 24px 20px; width: 100%; box-shadow: var(--shadow-lg); }
.login-card h2 { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 16px; text-align: center; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 5px; }
.form-group input, .form-group select {
  width: 100%;
  padding: 12px 14px;
  font-size: 16px;
  border: 1.5px solid #E2E6EC;
  border-radius: 10px;
  background: #fff;
  color: #1B2C48;
  box-sizing: border-box;
}

.form-group input:focus, .form-group select:focus { border-color: var(--blue); }
.btn-primary { width: 100%; padding: 13px; background: var(--navy); color: var(--white); border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; transition: background 0.2s, transform 0.1s; }
.btn-primary:active { transform: scale(0.98); }

/* DASHBOARD */
#dashboard { background: var(--off-white); }
.dash-header { background: var(--navy); padding: 50px 20px 20px; }
.dash-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.dash-user span { font-size: 13px; color: var(--light-blue); }
.dash-user strong { display: block; font-size: 17px; color: var(--white); font-weight: 700; }
.dash-signout { background: rgba(255,255,255,0.12); border: none; color: var(--light-blue); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 6px 12px; border-radius: 20px; cursor: pointer; }
.dash-date { font-size: 12px; color: var(--light-blue); margin-bottom: 2px; }
.dash-location { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--white); margin-bottom: 14px; }
.dash-progress-bar { background: rgba(255,255,255,0.15); border-radius: 8px; height: 7px; overflow: hidden; }
.dash-progress-fill { height: 100%; background: var(--blue); border-radius: 8px; transition: width 0.4s ease; }
.dash-progress-label { font-size: 11px; color: var(--light-blue); margin-top: 5px; text-align: right; }
.dash-body { padding: 16px; flex: 1; }
.dash-section-label { font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; margin-top: 18px; }
.dash-section-label:first-child { margin-top: 0; }
.checklist-card { background: var(--white); border-radius: var(--radius); padding: 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 9px; box-shadow: var(--shadow-sm); cursor: pointer; transition: transform 0.15s; border: 1.5px solid transparent; }
.checklist-card:active { transform: scale(0.98); }
.checklist-card.completed { border-color: var(--green); }
.checklist-card.in-progress { border-color: var(--blue); }
.card-icon { width: 44px; height: 44px; border-radius: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 20px; }
.card-icon.foh-open { background: #EAF4FD; }
.card-icon.foh-close { background: #FDF3E7; }
.card-icon.boh-open { background: #EAFAF1; }
.card-icon.boh-close { background: #FDEDEC; }
.card-info { flex: 1; }
.card-title { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 1px; }
.card-meta { font-size: 11px; color: var(--gray-400); }
.card-badge { font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 20px; flex-shrink: 0; }
.badge-done { background: var(--green-light); color: var(--green); }
.badge-progress { background: #EAF4FD; color: var(--blue); }
.badge-open { background: var(--gray-100); color: var(--gray-400); }
.card-chevron { color: var(--gray-400); font-size: 18px; }

/* CHECKLIST VIEW */
#checklist-view { background: var(--off-white); }
.cl-header { background: var(--navy); padding: 50px 20px 16px; }
.cl-header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.btn-back { background: rgba(255,255,255,0.15); border: none; color: var(--white); width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; flex-shrink: 0; }
.cl-header-label { font-size: 11px; color: var(--light-blue); margin-bottom: 1px; }
.cl-header-title { font-family: 'DM Serif Display', serif; font-size: 19px; color: var(--white); }
.cl-meta-bar { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--light-blue); margin-bottom: 10px; }
.cl-meta-bar strong { color: var(--white); }
.cl-time-bar { background: rgba(255,255,255,0.08); border-radius: 10px; padding: 8px 12px; display: flex; justify-content: space-between; font-size: 11px; color: var(--light-blue); margin-bottom: 10px; }
.cl-time-bar span strong { color: var(--white); }

/* progress ring */
.cl-progress { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.08); border-radius: 12px; padding: 10px 12px; }
.progress-ring-wrap { position: relative; width: 48px; height: 48px; flex-shrink: 0; }
.progress-ring { transform: rotate(-90deg); }
.progress-ring-bg { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 4; }
.progress-ring-fill { fill: none; stroke: var(--blue); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; }
.progress-pct { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 11px; font-weight: 700; color: var(--white); }
.stat-row { display: flex; gap: 16px; }
.progress-stat .num { font-size: 18px; font-weight: 700; color: var(--white); line-height: 1; }
.progress-stat .lbl { font-size: 10px; color: var(--light-blue); margin-top: 1px; }

.cl-body { padding: 14px; flex: 1; overflow-y: auto; padding-bottom: 100px; }

/* task section */
.task-section { margin-bottom: 14px; }
.task-section-header { font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 1px; padding: 0 4px; margin-bottom: 7px; }

/* task card */
.task-card { background: var(--white); border-radius: var(--radius-sm); padding: 13px; margin-bottom: 7px; box-shadow: var(--shadow-sm); border-left: 3px solid transparent; transition: border-color 0.2s; }
.task-card.task-yes { border-left-color: var(--green); }
.task-card.task-no { border-left-color: var(--red); }
.task-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.task-checkbox { width: 22px; height: 22px; border: 2px solid var(--gray-200); border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-top: 1px; transition: all 0.2s; }
.task-checkbox.checked { background: var(--navy); border-color: var(--navy); color: var(--white); font-size: 12px; }
.task-name { font-size: 14px; font-weight: 600; color: var(--navy); margin-bottom: 2px; }
.task-desc { font-size: 12px; color: var(--gray-600); line-height: 1.4; }

/* yn toggle */
.yn-toggle { display: flex; gap: 6px; margin-top: 8px; }
.yn-btn { flex: 1; padding: 8px; border: 1.5px solid var(--gray-200); border-radius: 8px; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.yn-btn.yes-btn.active { background: var(--green-light); border-color: var(--green); color: var(--green); }
.yn-btn.no-btn.active { background: var(--red-light); border-color: var(--red); color: var(--red); }
.yn-btn:not(.active) { color: var(--gray-400); }

/* corrective action */
.corrective-box { margin-top: 8px; background: var(--red-light); border-radius: 8px; padding: 10px 12px; border-left: 3px solid var(--red); }
.corrective-label { font-size: 11px; font-weight: 700; color: var(--red); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
.corrective-box textarea { width: 100%; border: 1.5px solid rgba(231,76,60,0.3); border-radius: 7px; padding: 8px 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--navy); resize: none; outline: none; height: 60px; background: var(--white); }

/* photo */
.photo-area { margin-top: 8px; border: 1.5px dashed var(--gray-200); border-radius: 8px; padding: 9px 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; background: var(--gray-100); font-family: 'DM Sans', sans-serif; }
.photo-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.photo-area-icon { font-size: 18px; flex-shrink: 0; }
.photo-area-text strong { display: block; font-size: 13px; color: var(--navy); }
.photo-area-text span { font-size: 11px; color: var(--gray-600); }
.photo-thumb { width: 40px; height: 40px; border-radius: 7px; object-fit: cover; border: 1.5px solid var(--gray-200); margin-left: auto; display: none; flex-shrink: 0; }
.photo-thumb.visible { display: block !important; }
.photo-thumb[src] { display: block; }
.photo-thumb.visible { display: block; }
.photo-area.has-photo { border-style: solid; border-color: var(--blue); background: #EAF4FD; }

/* temp input */
.temp-input-wrap { margin-top: 8px; }
.temp-row { display: flex; align-items: center; gap: 8px; }
.temp-input { flex: 1; padding: 10px 12px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; color: var(--navy); outline: none; text-align: center; }
.temp-input:focus { border-color: var(--blue); }
.temp-unit { font-size: 13px; color: var(--gray-400); font-weight: 600; }
.temp-flag { margin-top: 7px; font-size: 13px; font-weight: 700; }
.temp-flag.green { background: var(--green-light); color: #1a8a4a; display: block; }
.temp-flag.yellow { background: var(--yellow-light); color: #9a6500; display: block; }
.temp-flag.red { background: var(--red-light); color: var(--red); display: block; }

/* soup name input */
.soup-name-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--navy); outline: none; margin-bottom: 8px; }
.soup-name-input:focus { border-color: var(--blue); }

/* reroll button */
.reroll-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 9px; background: var(--gray-100); border: 1.5px solid var(--gray-200); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; color: var(--gray-600); cursor: pointer; margin-top: 6px; }
.reroll-btn:active { background: var(--gray-200); }

/* BOTS Daily Focus card */
.bots-focus-card { background: var(--navy); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 7px; }
.bots-focus-pill { background: #8B0000; color: var(--white); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 3px 8px; border-radius: 20px; display: inline-block; margin-bottom: 8px; }
.bots-focus-title { font-size: 16px; font-weight: 800; color: var(--white); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; line-height: 1.2; }
.bots-focus-standard { font-size: 12px; color: var(--light-blue); font-style: italic; margin-bottom: 10px; line-height: 1.4; }
.bots-look-for { background: rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; margin-bottom: 10px; }
.bots-look-label { font-size: 10px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.bots-look-item { font-size: 12px; color: var(--light-blue); padding: 2px 0; }
.bots-confirm { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.1); border-radius: 8px; padding: 11px; cursor: pointer; }
.bots-confirm-box { width: 22px; height: 22px; border: 2px solid rgba(255,255,255,0.4); border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.bots-confirm-box.checked { background: var(--blue); border-color: var(--blue); color: var(--white); font-size: 13px; }
.bots-confirm-text { font-size: 13px; color: var(--white); font-weight: 600; }

/* sign-off */
.signoff-card { background: var(--white); border-radius: var(--radius); padding: 18px; margin-top: 6px; box-shadow: var(--shadow-sm); }
.signoff-title { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 3px; }
.signoff-sub { font-size: 12px; color: var(--gray-400); margin-bottom: 12px; }
.sig-canvas-wrap { border: 1.5px solid var(--gray-200); border-radius: 10px; overflow: hidden; margin-bottom: 8px; background: var(--gray-100); }
#sig-canvas { display: block; width: 100%; height: 90px; touch-action: none; }
.sig-actions { display: flex; justify-content: flex-end; }
.btn-sig-clear { background: none; border: 1.5px solid var(--gray-200); border-radius: 8px; padding: 6px 12px; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--gray-600); cursor: pointer; }

/* submit bar */
.submit-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; padding: 10px 14px; background: var(--white); border-top: 1px solid var(--gray-200); box-shadow: 0 -4px 16px rgba(27,44,72,0.08); z-index: 100; }
.submit-btn { width: 100%; padding: 13px; background: var(--navy); color: var(--white); border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.submit-btn:disabled { background: var(--gray-400); cursor: not-allowed; }

/* SUCCESS */
#success { background: var(--navy); align-items: center; justify-content: center; text-align: center; padding: 40px 24px; }
.success-icon { font-size: 64px; margin-bottom: 16px; animation: pop 0.4s ease; }
@keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.2)} 100%{transform:scale(1)} }
.success-title { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--white); margin-bottom: 8px; }
.success-sub { font-size: 14px; color: var(--light-blue); margin-bottom: 4px; }
.success-times { font-size: 12px; color: var(--blue); margin-bottom: 6px; }
.success-detail { font-size: 12px; color: var(--blue); margin-bottom: 32px; }
.success-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }
.btn-outline-white { padding: 13px; background: rgba(255,255,255,0.12); color: var(--white); border: 1.5px solid rgba(255,255,255,0.25); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }

/* TOAST */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--navy); color: var(--white); padding: 11px 18px; border-radius: 12px; font-size: 13px; font-weight: 600; box-shadow: var(--shadow-lg); z-index: 9999; transition: transform 0.3s ease; max-width: 340px; width: 90%; text-align: center; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--red); }
.toast.success-toast { background: var(--green); }

.config-banner { background: #FFF3CD; border: 1px solid #FFEAA7; border-radius: var(--radius-sm); padding: 9px 12px; font-size: 12px; color: #856404; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
</style>

// Get daily BOTS action — same all day, changes at midnight
function getDailyBOTS() {
  const today = new Date().toISOString().slice(0,10);
  // Use date as seed for consistent same-day selection
  let seed = 0;
  for (let c of today) seed += c.charCodeAt(0);
  return BOTS_ACTIONS[seed % BOTS_ACTIONS.length];
}

// Get daily random item seeded by date + type - same result for ALL locations each day
function getDailyRandom(arr, type) {
  const today = new Date().toISOString().slice(0,10);
  let seed = 0;
  for (let c of today + type) seed += c.charCodeAt(0);
  return arr[seed % arr.length];
}
function getDailyPie() { return getDailyRandom(FRUIT_PIES, 'pie'); }
function getTomorrowItem(arr, type) {
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const tomorrowStr = tomorrow.toISOString().slice(0,10);
  let seed = 0;
  for (let c of tomorrowStr + type) seed += c.charCodeAt(0);
  return arr[seed % arr.length];
}
function getDailyBaked() { return getDailyRandom(BAKED_GOODS, 'baked'); }
function getDailyFood() { return getDailyRandom(FOOD_ITEMS, 'food'); }
function getDailySoup() { return getDailyRandom(SOUPS, 'soup'); }

function getTodayKey() { return new Date().toISOString().slice(0,10); }
function getCompletedKey(id) { const loc = (currentUser&&currentUser.location||'unknown').replace(/[^a-z0-9]/gi,'_'); return `gtpie_done_${getTodayKey()}_${loc}_${id}`; }
function markCompleted(id) {
  // Use localStorage so completion persists across browser sessions for the day
  try { localStorage.setItem(getCompletedKey(id), 'true'); } catch(e) {}
  try { sessionStorage.setItem(getCompletedKey(id), 'true'); } catch(e) {}
}
function isCompleted(id) {
  // Check localStorage first, fall back to sessionStorage
  try { if (localStorage.getItem(getCompletedKey(id)) === 'true') return true; } catch(e) {}
  try { return sessionStorage.getItem(getCompletedKey(id)) === 'true'; } catch(e) {}
  return false;
}
function getProgressKey(id) { const loc = (currentUser&&currentUser.location||'unknown').replace(/[^a-z0-9]/gi,'_'); return `gtpie_prog_${getTodayKey()}_${loc}_${id}`; }
function saveProgress(id, states) {
  const clean = {};
  Object.keys(states).forEach(k => {
    clean[k] = { ...states[k] };
    delete clean[k].photo;
    delete clean[k].photoData;
  });
  const key = getProgressKey(id);
  const val = JSON.stringify(clean);
  try { localStorage.setItem(key, val); } catch(e) {}
  try { sessionStorage.setItem(key, val); } catch(e) {}
}
function loadProgress(id) {
  try { const ls = localStorage.getItem(getProgressKey(id)); if (ls) return JSON.parse(ls); } catch(e) {}
  try { const ss = sessionStorage.getItem(getProgressKey(id)); if (ss) return JSON.parse(ss); } catch(e) {}
  return {};
}
function getRandKey(id, type) { return `gtpie_rand_${getTodayKey()}_${id}_${type}`; }

function formatTime(ts) {
  if (!ts) return "—";
  const d = new Date(ts);
  return d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true});
}
function formatDateTime(ts) {
  if (!ts) return "—";
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'}) + ' ' + formatTime(ts);
}

function handleLogin() {
  const fn = document.getElementById('first-name').value.trim();
  const ln = document.getElementById('last-name').value.trim();
  const loc = document.getElementById('location-select').value;
  if (!fn||!ln||!loc) { showToast('Please fill in all fields', 'error'); return; }
  // Always clear all checklist progress on new login
  const keysToRemove = [];
  for (let i = 0; i < sessionStorage.length; i++) {
    const k = sessionStorage.key(i);
    if (k && k !== 'gtpie_user') keysToRemove.push(k);
  }
  keysToRemove.forEach(k => sessionStorage.removeItem(k));
  currentUser = { firstName:fn, lastName:ln, location:loc, fullName:`${fn} ${ln}` };
  sessionStorage.setItem('gtpie_user', JSON.stringify(currentUser));
  showDashboard();
}
function handleSignout() { sessionStorage.removeItem('gtpie_user'); currentUser=null; showScreen('splash'); }

function showDashboard() {
  document.getElementById('dash-name').textContent = currentUser.firstName;
  document.getElementById('dash-location').textContent = currentUser.location;
  const hr = new Date().getHours();
  const min = new Date().getMinutes();
  const timeDecimal = hr + min/60;
  document.querySelector('.dash-user span').textContent = hr<12?'Good morning,':hr<17?'Good afternoon,':'Good evening,';
  updateDashboardCards();
  showScreen('dashboard');
  // Show late alert if checklists are overdue
  const alertEl = document.getElementById('late-alert');
  const openingDone = isCompleted('foh-open');
  const middayDone = isCompleted('midday');
  const messages = [];
  if (!openingDone && timeDecimal >= 9) messages.push('Opening Check is past due — should be completed by 9:00 AM');
  if (!middayDone && timeDecimal >= 15) messages.push('Midday Check is past due — should be completed by 3:00 PM');
  if (messages.length > 0) {
    alertEl.textContent = '⚠ ' + messages.join(' · ');
    alertEl.style.display = 'block';
  } else {
    alertEl.style.display = 'none';
  }
}

function getAllTasks(cl) {
  return (cl.sections||[]).flatMap(s => s.tasks);
}

function updateDashboardCards() {
  const cards = {
    'foh-open': FOH_OPEN_CHECKLIST,
    'midday': MIDDAY_CHECKLIST
  };
  let completedCount = 0;
  Object.entries(cards).forEach(([id, cl]) => {
    const allTasks = getAllTasks(cl);
    const total = allTasks.length;
    const progress = loadProgress(id);
    const done = allTasks.filter(t => { const s=progress[t.id]; return s&&(s.value==='yes'||s.value==='check'||s.value==='temp'||s.value==='confirmed'); }).length;
    const badge = document.getElementById(`${id}-badge`);
    const meta = document.getElementById(`${id}-meta`);
    const card = badge ? badge.closest('.checklist-card') : null;
    if (meta) meta.textContent = `${done} of ${total} tasks complete`;
    if (badge && card) {
      if (isCompleted(id)) { badge.textContent='✓ Done'; badge.className='card-badge badge-done'; card.className='checklist-card completed'; completedCount++; }
      else if (done > 0) { badge.textContent=`${Math.round(done/total*100)}%`; badge.className='card-badge badge-progress'; card.className='checklist-card in-progress'; }
      else { badge.textContent='Open'; badge.className='card-badge badge-open'; card.className='checklist-card'; }
    }
  });
  const pct = Math.round(completedCount/2*100);
  document.getElementById('dash-pbar').style.width = pct+'%';
  document.getElementById('dash-plabel').textContent = `${completedCount} of 2 complete`;
}

function submitLateReason(id) {
  const reason = document.getElementById('late-reason-input').value.trim();
  if (!reason) {
    document.getElementById('late-reason-input').style.border = '1.5px solid #E74C3C';
    return;
  }
  lateReasons[id] = reason;
  const overlay = document.getElementById('late-reason-overlay');
  if (overlay) overlay.remove();
  openChecklist(id);
}

function openChecklist(id) {
  // Check if this checklist is past due and no reason given yet
  const now = new Date();
  const hr = now.getHours();
  const min = now.getMinutes();
  const timeDecimal = hr + min/60;
  const isOpeningLate = id === 'foh-open' && timeDecimal >= 9 && !isCompleted(id);
  const isMiddayLate = id === 'midday' && timeDecimal >= 15 && !isCompleted(id);
  if ((isOpeningLate || isMiddayLate) && !lateReasons[id]) {
    showLateReasonModal(id, isOpeningLate ? '9:00 AM' : '3:00 PM');
    return;
  }
  currentChecklistId = id;
  taskStates = loadProgress(id);
  checklistStartTime = sessionStorage.getItem(`gtpie_start_${getTodayKey()}_${id}`) || null;
  if (!checklistStartTime) {
    checklistStartTime = new Date().toISOString();
    sessionStorage.setItem(`gtpie_start_${getTodayKey()}_${id}`, checklistStartTime);
  }
  // Init random selections (persist for the day)
  // Date-seeded selections - same for all locations each day
  randomSelections.pie = getDailyPie();
  randomSelections.baked = getDailyBaked();
  randomSelections.food = getDailyFood();
  randomSelections.soup = getDailySoup();

  const cl = id === 'midday' ? MIDDAY_CHECKLIST : FOH_OPEN_CHECKLIST;
  document.getElementById('cl-label').textContent = currentUser.location;
  document.getElementById('cl-title').textContent = cl.label;
  document.getElementById('cl-assignee').textContent = currentUser.fullName;
  document.getElementById('cl-start-time').textContent = formatTime(checklistStartTime);
  document.getElementById('cl-end-time').textContent = 'In progress';

  renderTasks(cl);
  updateProgress();
  showScreen('checklist-view');
  setTimeout(() => { sigCanvas = document.getElementById('sig-canvas'); if (sigCanvas) setupSignature(); if (signatures[id]) redrawSig(id); }, 100);
}

// ── TEMP HELPERS ──
function buildCoolerFlagHTML(temp) {
  temp = parseFloat(temp);
  if (isNaN(temp)) return '';
  if (temp < 30) return '<div style="padding:8px 10px;border-radius:8px;background:#FDEDEC;color:#E74C3C;font-weight:700;font-size:13px;margin-top:6px;">[ALERT] Too cold — below 30F, risk of freezing product. Check immediately.</div>';
  if (temp <= 40) return '<div style="padding:8px 10px;border-radius:8px;background:#EAFAF1;color:#1a8a4a;font-weight:700;font-size:13px;margin-top:6px;">[OK] Good — ideal cooler temp (30-40F)</div>';
  if (temp <= 45) return '<div style="padding:8px 10px;border-radius:8px;background:#FEF9EC;color:#9a6500;font-weight:700;font-size:13px;margin-top:6px;">[WARN] Attention — temp too warm, notify manager immediately</div>';
  return '<div style="padding:8px 10px;border-radius:8px;background:#FDEDEC;color:#E74C3C;font-weight:700;font-size:13px;margin-top:6px;">[ALERT] DANGER — Do not use. Remove product. Notify manager NOW.</div>';
}

function buildFreezerFlagHTML(temp) {
  temp = parseFloat(temp);
  if (isNaN(temp)) return '';
  if (temp <= 0) return '<div style="padding:8px 10px;border-radius:8px;background:#EAFAF1;color:#1a8a4a;font-weight:700;font-size:13px;margin-top:6px;">🟢 Good — holding at proper temp</div>';
  if (temp <= 10) return '<div style="padding:8px 10px;border-radius:8px;background:#FEF9EC;color:#9a6500;font-weight:700;font-size:13px;margin-top:6px;">🟡 Attention — Notify manager immediately</div>';
  return '<div style="padding:8px 10px;border-radius:8px;background:#FDEDEC;color:#E74C3C;font-weight:700;font-size:13px;margin-top:6px;">🔴 DANGER — Check product integrity. Notify manager NOW.</div>';
}
function buildSoupFlag(temp, taskId, returnHTML) {
  temp = parseFloat(temp);
  if (isNaN(temp)) return '';
  let html = '';
  if (temp > 145) html = '<span style="color:#E74C3C;font-weight:700;">🔴 Too hot — product may be overcooking. Reduce heat and notify manager.</span>';
  else if (temp >= 135) html = '<span style="color:#1a8a4a;font-weight:700;">🟢 Good — holding at proper temp (135–145°F)</span>';
  else if (temp >= 120) html = '<span style="color:#9a6500;font-weight:700;">🟡 Attention — Reheat immediately. Notify manager.</span>';
  else html = '<span style="color:#E74C3C;font-weight:700;">🔴 DANGER — Do not serve. Remove from line. Notify manager NOW.</span>';
  if (returnHTML) return html;
  const el = document.getElementById(`flag-${taskId}`);
  if (el) el.innerHTML = html;
}

function evalCoolerTemp(taskId, val) {
  const temp = parseFloat(val);
  const el = document.getElementById('flag-' + taskId);
  if (el) {
    el.style.display = 'block';
    el.innerHTML = buildCoolerFlagHTML(temp);
  }
  const alert = !isNaN(temp) && (temp > 40 || temp < 32);
  taskStates[taskId] = { ...(taskStates[taskId]||{}), temp:val, value:'temp', tempAlert:alert };
  saveProgress(currentChecklistId, taskStates);
  updateCorrectiveBox(taskId, alert);
  updateProgress();
}
function evalFreezerTemp(taskId, val) {
  const temp = parseFloat(val);
  const el = document.getElementById('flag-' + taskId);
  if (el) {
    el.style.display = 'block';
    el.innerHTML = buildFreezerFlagHTML(temp);
  }
  const alert = !isNaN(temp) && temp > 0;
  taskStates[taskId] = { ...(taskStates[taskId]||{}), temp:val, value:'temp', tempAlert:alert };
  saveProgress(currentChecklistId, taskStates);
  updateCorrectiveBox(taskId, alert);
  updateProgress();
}
function evalSoupTemp(taskId, val) {
  const temp = parseFloat(val);
  buildSoupFlag(temp, taskId, false);
  const alert = !isNaN(temp) && temp < 135;
  taskStates[taskId] = { ...(taskStates[taskId]||{}), temp:val, value:'temp', tempAlert:alert };
  saveProgress(currentChecklistId, taskStates);
  updateCorrectiveBox(taskId, alert);
  updateProgress();
}
function updateCorrectiveBox(taskId, show) {
  const card = document.getElementById('card-' + taskId);
  if (!card) return;
  let box = card.querySelector('.corrective-box');
  if (show && !box) {
    box = document.createElement('div');
    box.className = 'corrective-box';
    const label = document.createElement('div');
    label.className = 'corrective-label';
    label.textContent = '⚠ Corrective Action Required';
    const ta = document.createElement('textarea');
    // Use task-specific placeholder
    const taskType = card.dataset.taskType || '';
    if (taskType === 'random-pie') {
      ta.placeholder = "Why didn't you like this pie and how are you going to correct the defect?";
    } else if (taskType === 'random-baked') {
      ta.placeholder = "Why didn't you like this bakery item and how are you going to correct the defect?";
    } else if (taskType === 'random-food') {
      ta.placeholder = "Why didn't you like this product and how are you going to correct the defect?";
    } else {
      ta.placeholder = 'Describe the issue and action taken...';
    }
    ta.value = (taskStates[taskId] && taskStates[taskId].note) || '';
    ta.onchange = function() { saveNote(taskId, this.value); };
    box.appendChild(label);
    box.appendChild(ta);
    card.appendChild(box);
  } else if (!show && box) {
    box.remove();
  }
}

function saveSoupName(taskId, val) {
  taskStates[taskId] = { ...(taskStates[taskId]||{}), soupName:val };
  saveProgress(currentChecklistId, taskStates);
}

function triggerPhoto(taskId) {
  // iOS Safari requires user gesture to be directly on the input or its label
  // Programmatic .click() on hidden inputs is blocked on iOS
  // This function is kept as fallback for non-iOS
  const input = document.getElementById('photo-input-' + taskId);
  if (input) {
    try { input.click(); } catch(e) {}
  }
}

function handlePhoto(taskId, input) {
  try {
    const file = input.files[0];
    if (!file) return;
    if (!taskStates[taskId]) taskStates[taskId] = {};

    // Compress photo to ~800px wide JPEG before storing
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const maxW = 600;
        const scale = Math.min(1, maxW / img.width);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const compressed = canvas.toDataURL('image/jpeg', 0.4);
        taskStates[taskId].photo = 'captured';
        taskStates[taskId].photoData = compressed;
        // Update UI
        const area = document.getElementById('photo-area-' + taskId);
        if (area) {
          area.style.background = '#EAF4FD';
          area.style.border = '1.5px solid #7BBDE1';
          const icon = area.querySelector('.photo-area-icon');
          const txt = area.querySelector('.photo-area-text');
          if (icon) icon.textContent = '📷';
          if (txt) txt.innerHTML = '<strong>Photo captured ✓</strong><span>Tap to retake</span>';
        }
        showToast('✓ Photo captured', 'success');
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
    input.value = '';
  } catch(err) {
    showToast('Try again', 'error');
  }
}

// ── PROGRESS ──
function updateProgress() {
  const cl = currentChecklistId==='midday'?MIDDAY_CHECKLIST:FOH_OPEN_CHECKLIST;
  const allTasks = getAllTasks(cl);
  const total = allTasks.length;
  const done = allTasks.filter(t => { const s=taskStates[t.id]; return s&&(s.value==='yes'||s.value==='check'||s.value==='temp'||s.value==='confirmed'); }).length;
  const pct = total>0?Math.round(done/total*100):0;
  const circ = 131.0;
  const offset = circ - (pct/100*circ);
  const ring = document.getElementById('ring-fill');
  if (ring) ring.style.strokeDashoffset = offset;
  const pctEl = document.getElementById('ring-pct');
  if (pctEl) pctEl.textContent = pct+'%';
  const doneEl = document.getElementById('stat-done'); if(doneEl) doneEl.textContent = done;
  const remEl = document.getElementById('stat-remain'); if(remEl) remEl.textContent = total-done;
  const totEl = document.getElementById('stat-total'); if(totEl) totEl.textContent = total;
  // update end time display
  const endEl = document.getElementById('cl-end-time');
  if (endEl) endEl.textContent = 'In progress';
}

// ── SIGNATURE ──
function setupSignature() {
  sigCtx = sigCanvas.getContext('2d');
  sigCtx.strokeStyle='#1B2C48'; sigCtx.lineWidth=2; sigCtx.lineCap='round';
  sigCanvas.removeEventListener('mousedown',startDraw); sigCanvas.removeEventListener('mousemove',draw); sigCanvas.removeEventListener('mouseup',endDraw);
  sigCanvas.addEventListener('mousedown',startDraw); sigCanvas.addEventListener('mousemove',draw); sigCanvas.addEventListener('mouseup',endDraw);
  sigCanvas.addEventListener('touchstart',e=>{e.preventDefault();startDraw(e.touches[0]);},{passive:false});
  sigCanvas.addEventListener('touchmove',e=>{e.preventDefault();draw(e.touches[0]);},{passive:false});
  sigCanvas.addEventListener('touchend',endDraw,{passive:false});
}
function getPos(e) { const r=sigCanvas.getBoundingClientRect(); return {x:(e.clientX-r.left)*(sigCanvas.width/r.width), y:(e.clientY-r.top)*(sigCanvas.height/r.height)}; }
function startDraw(e) { sigDrawing=true; sigCtx.beginPath(); const p=getPos(e); sigCtx.moveTo(p.x,p.y); }
function draw(e) { if(!sigDrawing)return; const p=getPos(e); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); }
function endDraw() { sigDrawing=false; if(sigCanvas) signatures[currentChecklistId]=sigCanvas.toDataURL(); }
function clearSig() { if(sigCtx)sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height); delete signatures[currentChecklistId]; }
function redrawSig(id) { if(!signatures[id]||!sigCtx)return; const img=new Image(); img.onload=()=>sigCtx.drawImage(img,0,0); img.src=signatures[id]; }
function hasSig() { return !!signatures[currentChecklistId]; }

// ── SUBMIT ──
async function submitChecklist() {
  if (!hasSig()) { showToast('Manager signature required', 'error'); return; }
  const cl = currentChecklistId==='midday'?MIDDAY_CHECKLIST:FOH_OPEN_CHECKLIST;
  const allTasks = getAllTasks(cl);
  const answered = allTasks.filter(t=>{const s=taskStates[t.id]; return s&&(s.value==='yes'||s.value==='no'||s.value==='check'||s.value==='temp'||s.value==='confirmed');}).length;
  if (answered < Math.ceil(allTasks.length*0.5)) { showToast('Please complete more tasks before submitting', 'error'); return; }

  const endTime = new Date().toISOString();
  const btn = document.getElementById('submit-btn');
  btn.disabled=true; btn.innerHTML='<span>⏳</span> Submitting...';

  const duration = checklistStartTime ? Math.round((new Date(endTime)-new Date(checklistStartTime))/60000) : null;

  const payload = {
    timestamp: endTime,
    checklist: cl.label,
    checklistId: currentChecklistId,
    employee: currentUser.fullName,
    location: currentUser.location,
    startTime: checklistStartTime,
    endTime: endTime,
    durationMinutes: duration,
    tasksAnswered: answered,
    tasksTotal: allTasks.length,
    randomPie: randomSelections.pie,
    randomFood: randomSelections.food,
    randomBaked: randomSelections.baked,
    randomSoup: randomSelections.soup,
    dailyBOTS: getDailyBOTS().title,
    signature: signatures[currentChecklistId]||'',
    lateReason: lateReasons[currentChecklistId]||null,
    tasks: allTasks.map(t=>({id:t.id,name:t.name,type:t.type,value:taskStates[t.id]?.value||'unanswered',temp:taskStates[t.id]?.temp||null,note:taskStates[t.id]?.note||'',hasPhoto:!!(taskStates[t.id]?.photo),photoData:taskStates[t.id]?.photoData||null}))
  };

  try {
    if (WEBHOOK_URL) {
      // Clean POST to Cloudflare Worker relay
      const leanPayload = { ...payload };
      delete leanPayload.signature;
      // Keep photoData in tasks array for email attachments
      fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(leanPayload)
      }).catch(() => {});
    }
    markCompleted(currentChecklistId);
    saveProgress(currentChecklistId, taskStates);
    document.getElementById('success-sub').textContent = `${cl.label} submitted`;
    document.getElementById('success-times').textContent = `Started: ${formatTime(checklistStartTime)} · Completed: ${formatTime(endTime)}`;
    document.getElementById('success-detail').textContent = duration ? `Completed in ${duration} minute${duration!==1?'s':''} · ${currentUser.location}` : currentUser.location;
    showScreen('success');
  } catch(err) {
    btn.disabled=false; btn.innerHTML='<span>📋</span> Submit Checklist';
    showToast('Submission failed — please try again', 'error');
  }
}

function goBack() { updateDashboardCards(); showScreen('dashboard'); }
function goToDashboard() { updateDashboardCards(); showScreen('dashboard'); }
function startAnotherChecklist() { updateDashboardCards(); showScreen('dashboard'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

let toastTimer;
function showToast(msg,type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type==='error'?'error':type==='success'?'success-toast':''} show`;
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
}
</script>

  <div class="splash-title">GT Pie<br>Daily Checklists</div>
  <div class="splash-sub">Best on the Street · Every Day</div>
  <div class="login-card">
    <h2>Sign In to Start</h2>
    <div class="form-group"><label>First Name</label><input type="text" id="first-name" placeholder="Your first name" autocomplete="given-name"></div>
    <div class="form-group"><label>Last Name</label><input type="text" id="last-name" placeholder="Your last name" autocomplete="family-name"></div>
    <div class="form-group"><label>Location</label><select id="location-select"><option value="">Select your location...</option><option value="Ann Arbor">Ann Arbor</option><option value="Brighton">Brighton</option><option value="East Lansing">East Lansing</option><option value="Midland">Midland</option><option value="Norton Shores">Norton Shores</option><option value="Okemos">Okemos</option><option value="Plymouth">Plymouth</option><option value="Portage">Portage</option><option value="Terre Haute, IN">Terre Haute, IN</option><option value="Traverse City – Front St">Traverse City – Front St</option><option value="Traverse City – Park St">Traverse City – Park St</option></select></div>
    <button class="btn-primary" onclick="handleLogin()">Start Checklists →</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
  <div id="late-alert" style="display:none;background:#E74C3C;color:#fff;padding:10px 16px;font-size:13px;font-weight:500;text-align:center;animation:flashAlert 1s ease-in-out 3;"></div>
  <div class="dash-header">
    <div class="dash-header-top">
      <div class="dash-user"><span>Good morning,</span><strong id="dash-name">—</strong></div>
      <button class="dash-signout" onclick="handleSignout()">Sign Out</button>
    </div>
    <div class="dash-date" id="dash-date"></div>
    <div class="dash-location" id="dash-location"></div>
    <div class="dash-progress-bar"><div class="dash-progress-fill" id="dash-pbar" style="width:0%"></div></div>
    <div class="dash-progress-label" id="dash-plabel">0 of 4 complete</div>
  </div>
  <div class="dash-body">
    <div class="dash-section-label">Today's Checklists</div>
    <div class="checklist-card" onclick="openChecklist('foh-open')">
      <div class="card-icon foh-open">☀️</div>
      <div class="card-info"><div class="card-title">Opening Check</div><div class="card-meta" id="foh-open-meta">0 tasks complete</div></div>
      <div class="card-badge badge-open" id="foh-open-badge">Open</div>
      <div class="card-chevron">›</div>
    </div>
    <div class="checklist-card" onclick="openChecklist('midday')">
      <div class="card-icon boh-open">☀️</div>
      <div class="card-info"><div class="card-title">Midday Check</div><div class="card-meta" id="midday-meta">0 tasks complete</div></div>
      <div class="card-badge badge-open" id="midday-badge">Open</div>
      <div class="card-chevron">›</div>
    </div>
  </div>
</div>

<!-- CHECKLIST VIEW -->
<div id="checklist-view" class="screen">
  <div class="cl-header">
    <div class="cl-header-top">
      <button class="btn-back" onclick="goBack()">‹</button>
      <div class="cl-header-info">
        <div class="cl-header-label" id="cl-label"></div>
        <div class="cl-header-title" id="cl-title"></div>
      </div>
    </div>
    <div class="cl-meta-bar">
      <span>Completed by: <strong id="cl-assignee"></strong></span>
    </div>
    <div class="cl-time-bar">
      <span>🕐 Started: <strong id="cl-start-time">—</strong></span>
      <span>🏁 Status: <strong id="cl-end-time">—</strong></span>
    </div>
    <div class="cl-progress">
      <div class="progress-ring-wrap">
        <svg class="progress-ring" width="48" height="48" viewBox="0 0 48 48">
          <circle class="progress-ring-bg" cx="24" cy="24" r="20"/>
          <circle class="progress-ring-fill" id="ring-fill" cx="24" cy="24" r="20" stroke-dasharray="131.0" stroke-dashoffset="131.0"/>
        </svg>
        <div class="progress-pct" id="ring-pct">0%</div>
      </div>
      <div class="progress-stats">
        <div class="stat-row">
          <div class="progress-stat"><div class="num" id="stat-done">0</div><div class="lbl">Done</div></div>
          <div class="progress-stat"><div class="num" id="stat-remain">0</div><div class="lbl">Left</div></div>
          <div class="progress-stat"><div class="num" id="stat-total">0</div><div class="lbl">Total</div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="cl-body" id="cl-body"></div>
  <div class="submit-bar">
    <button class="submit-btn" id="submit-btn" onclick="submitChecklist()"><span>📋</span> Submit Checklist</button>
  </div>
</div>

<!-- SUCCESS -->
<div id="success" class="screen">
  <div class="success-icon">✅</div>
  <div class="success-title">Submitted!</div>
  <div class="success-sub" id="success-sub"></div>
  <div class="success-times" id="success-times"></div>
  <div class="success-detail" id="success-detail"></div>
  <div class="success-actions">
    <button class="btn-primary" onclick="goToDashboard()">← Back to Dashboard</button>
    <button class="btn-outline-white" onclick="startAnotherChecklist()">Start Another Checklist</button>
  </div>
</div>

<div class="toast" id="toast"></div>
