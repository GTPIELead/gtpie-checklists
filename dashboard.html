<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GT Pie — Manager Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1B2C48;
    --blue: #7BBDE1;
    --light-blue: #BBD9EE;
    --green: #2ECC71;
    --yellow: #F39C12;
    --red: #E74C3C;
    --bg: #0D1820;
    --surface: #162130;
    --surface2: #1E2F42;
    --border: rgba(123,189,225,0.15);
    --text: #E8F4FD;
    --text-dim: #7BBDE1;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
  }

  /* PIN SCREEN */
  #pin-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: radial-gradient(ellipse at 50% 0%, rgba(123,189,225,0.08) 0%, transparent 70%);
  }

  .pin-logo {
    font-family: var(--display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 8px;
  }

  .pin-title {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 40px;
  }

  .pin-dots {
    display: flex;
    gap: 14px;
    margin-bottom: 32px;
  }

  .pin-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1.5px solid var(--blue);
    background: transparent;
    transition: background 0.15s;
  }

  .pin-dot.filled { background: var(--blue); }

  .pin-pad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 220px;
  }

  .pin-btn {
    padding: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--display);
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.1s;
  }

  .pin-btn:active { transform: scale(0.95); background: var(--surface); }
  .pin-btn.action { color: var(--blue); font-family: var(--mono); font-size: 13px; }
  .pin-btn.go { background: var(--blue); color: var(--navy); }

  .pin-error {
    display: none;
    margin-top: 16px;
    color: var(--red);
    font-size: 12px;
    letter-spacing: 1px;
  }

  /* DASHBOARD */
  #dashboard {
    display: none;
    min-height: 100vh;
    flex-direction: column;
  }

  .dash-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .dash-brand {
    font-family: var(--display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blue);
  }

  .dash-title {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
  }

  .dash-actions { display: flex; gap: 8px; }

  .btn-refresh {
    background: var(--blue);
    color: var(--navy);
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-family: var(--display);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-refresh:hover { opacity: 0.85; }

  .btn-exit {
    background: transparent;
    color: var(--blue);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
  }

  .dash-date {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* SUMMARY ROW */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .summary-card {
    background: var(--surface);
    padding: 16px 20px;
    text-align: center;
  }

  .summary-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .summary-value {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 800;
  }

  .summary-value.good { color: var(--green); }
  .summary-value.warn { color: var(--yellow); }
  .summary-value.bad { color: var(--red); }

  /* LOCATIONS GRID */
  .locations-grid {
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  .location-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }

  .location-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    background: var(--border);
  }

  .location-card.all-good::before { background: var(--green); }
  .location-card.has-flags::before { background: var(--red); }
  .location-card.partial::before { background: var(--yellow); }

  .location-name {
    font-family: var(--display);
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
  }

  .check-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .check-pill {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    font-family: var(--mono);
  }

  .check-done { background: rgba(46,204,113,0.15); color: #2ECC71; }
  .check-late { background: rgba(243,156,18,0.15); color: #F39C12; }
  .check-missing { background: rgba(231,76,60,0.15); color: #E74C3C; }

  .check-info {
    font-size: 10px;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  .flag-section {
    margin-top: 8px;
    padding: 8px 10px;
    background: rgba(231,76,60,0.08);
    border: 1px solid rgba(231,76,60,0.2);
    border-radius: 8px;
  }

  .flag-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--red);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .flag-item {
    font-size: 11px;
    color: rgba(231,76,60,0.8);
    margin-bottom: 2px;
    line-height: 1.4;
  }

  .flag-item strong { color: var(--text); }

  .late-reason {
    margin-top: 6px;
    padding: 6px 10px;
    background: rgba(243,156,18,0.08);
    border: 1px solid rgba(243,156,18,0.2);
    border-radius: 8px;
    font-size: 11px;
    color: rgba(243,156,18,0.9);
  }

  .photo-section {
    margin-top: 8px;
  }

  .photo-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .photo-thumbs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .photo-thumb {
    width: 56px;
    height: 56px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.15s;
  }

  .photo-thumb:hover { transform: scale(1.05); }

  /* LOADING */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    color: var(--text-dim);
    font-size: 13px;
    gap: 12px;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .last-updated {
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    padding: 12px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-logo">Grand Traverse Pie Co.</div>
  <div class="pin-title">Manager Dashboard</div>
  <div class="pin-dots">
    <div class="pin-dot" id="dot-0"></div>
    <div class="pin-dot" id="dot-1"></div>
    <div class="pin-dot" id="dot-2"></div>
    <div class="pin-dot" id="dot-3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress(1)">1</button>
    <button class="pin-btn" onclick="pinPress(2)">2</button>
    <button class="pin-btn" onclick="pinPress(3)">3</button>
    <button class="pin-btn" onclick="pinPress(4)">4</button>
    <button class="pin-btn" onclick="pinPress(5)">5</button>
    <button class="pin-btn" onclick="pinPress(6)">6</button>
    <button class="pin-btn" onclick="pinPress(7)">7</button>
    <button class="pin-btn" onclick="pinPress(8)">8</button>
    <button class="pin-btn" onclick="pinPress(9)">9</button>
    <button class="pin-btn action" onclick="pinClear()">CLR</button>
    <button class="pin-btn" onclick="pinPress(0)">0</button>
    <button class="pin-btn go" onclick="pinSubmit()">→</button>
  </div>
  <div class="pin-error" id="pin-error">Incorrect PIN</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-header">
    <div>
      <div class="dash-brand">GT Pie Daily Operations</div>
      <div class="dash-title">Manager Dashboard</div>
    </div>
    <div class="dash-actions">
      <div class="dash-date" id="dash-date"></div>
      <button class="btn-refresh" onclick="loadData()">↻ Refresh</button>
      <button class="btn-exit" onclick="showPin()">Exit</button>
    </div>
  </div>

  <div class="summary-row">
    <div class="summary-card">
      <div class="summary-label">Complete</div>
      <div class="summary-value" id="sum-complete">--</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Temp Flags</div>
      <div class="summary-value" id="sum-flags">--</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Corrective</div>
      <div class="summary-value" id="sum-corrective">--</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Late</div>
      <div class="summary-value" id="sum-late">--</div>
    </div>
  </div>

  <div class="locations-grid" id="locations-grid">
    <div class="loading-state">
      <div class="spinner"></div>
      Loading today's data...
    </div>
  </div>

  <div class="last-updated" id="last-updated"></div>
</div>

<script>
const PIN = '7743';
const LOCATIONS = [
  'Ann Arbor','Brighton','East Lansing','Midland','Norton Shores',
  'Okemos','Plymouth','Portage','Terre Haute, IN',
  'Traverse City - Front St','Traverse City - Park St'
];

let pinEntry = '';

function pinPress(n) {
  if (pinEntry.length >= 4) return;
  pinEntry += n.toString();
  updateDots();
  if (pinEntry.length === 4) setTimeout(pinSubmit, 150);
}

function pinClear() {
  pinEntry = '';
  updateDots();
  document.getElementById('pin-error').style.display = 'none';
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('dot-' + i).classList.toggle('filled', i < pinEntry.length);
  }
}

function pinSubmit() {
  if (pinEntry === PIN) {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'flex';
    document.getElementById('dashboard').style.flexDirection = 'column';
    document.getElementById('dash-date').textContent = new Date().toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
    loadData();
  } else {
    pinEntry = '';
    updateDots();
    document.getElementById('pin-error').style.display = 'block';
    setTimeout(() => document.getElementById('pin-error').style.display = 'none', 2000);
  }
}

function showPin() {
  pinEntry = '';
  updateDots();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
}

async function loadData() {
  const grid = document.getElementById('locations-grid');
  grid.innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading today\'s data...</div>';

  try {
    const res = await fetch('/api/dashboard');
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to load');
    renderDashboard(data.submissions || []);
    document.getElementById('last-updated').textContent = 'Last updated: ' + new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
  } catch(err) {
    grid.innerHTML = '<div class="loading-state">Error: ' + err.message + '<br><br><button class="btn-refresh" onclick="loadData()">Retry</button></div>';
  }
}

function renderDashboard(submissions) {
  const locationData = {};
  LOCATIONS.forEach(loc => {
    locationData[loc] = { opening: null, midday: null, tempFlags: [], corrective: [], photos: [], lateReasons: [] };
  });

  submissions.forEach(data => {
    const loc = data.location;
    if (!locationData[loc]) locationData[loc] = { opening: null, midday: null, tempFlags: [], corrective: [], photos: [], lateReasons: [] };
    const isOpening = (data.checklist||'').toLowerCase().includes('opening');
    const isMidday = (data.checklist||'').toLowerCase().includes('midday');
    const startTime = data.startTime ? new Date(data.startTime) : null;
    let onTime = true;
    if (startTime) {
      const h = startTime.getHours() + startTime.getMinutes()/60;
      onTime = (isOpening && h <= 9) || (isMidday && h <= 15);
    }
    const endTime = data.timestamp || data.endTime;
    const sub = {
      employee: data.employee,
      time: endTime ? new Date(endTime).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '--',
      onTime,
      lateReason: data.lateReason
    };
    if (isOpening) locationData[loc].opening = sub;
    if (isMidday) locationData[loc].midday = sub;
    if (data.lateReason) locationData[loc].lateReasons.push({ checklist: isOpening?'Opening':'Midday', reason: data.lateReason });

    (data.tasks||[]).forEach(t => {
      if (t.tempAlert) locationData[loc].tempFlags.push({ name: t.name, temp: t.temp });
      if (t.value === 'no' && t.note) locationData[loc].corrective.push({ task: t.name, note: t.note });
      if (t.photoUrl) locationData[loc].photos.push({ url: t.photoUrl, task: t.name });
    });
  });

  // Summary
  const completeBoth = LOCATIONS.filter(l => locationData[l].opening && locationData[l].midday).length;
  const totalFlags = Object.values(locationData).reduce((s,l) => s + l.tempFlags.length, 0);
  const totalCorrective = Object.values(locationData).reduce((s,l) => s + l.corrective.length, 0);
  const totalLate = Object.values(locationData).reduce((s,l) => s + (l.opening&&!l.opening.onTime?1:0) + (l.midday&&!l.midday.onTime?1:0), 0);

  const sumComplete = document.getElementById('sum-complete');
  sumComplete.textContent = completeBoth + '/11';
  sumComplete.className = 'summary-value ' + (completeBoth === 11 ? 'good' : completeBoth >= 8 ? 'warn' : 'bad');

  const sumFlags = document.getElementById('sum-flags');
  sumFlags.textContent = totalFlags;
  sumFlags.className = 'summary-value ' + (totalFlags === 0 ? 'good' : 'bad');

  const sumCorrective = document.getElementById('sum-corrective');
  sumCorrective.textContent = totalCorrective;
  sumCorrective.className = 'summary-value ' + (totalCorrective === 0 ? 'good' : 'warn');

  const sumLate = document.getElementById('sum-late');
  sumLate.textContent = totalLate;
  sumLate.className = 'summary-value ' + (totalLate === 0 ? 'good' : 'warn');

  // Location cards
  const grid = document.getElementById('locations-grid');
  grid.innerHTML = LOCATIONS.map(loc => {
    const d = locationData[loc];
    const allGood = d.opening && d.midday && d.opening.onTime && d.midday.onTime && !d.tempFlags.length && !d.corrective.length;
    const hasFlags = d.tempFlags.length > 0 || d.corrective.length > 0;
    const cardClass = allGood ? 'all-good' : hasFlags ? 'has-flags' : (d.opening || d.midday) ? 'partial' : '';

    function pill(sub, label) {
      if (!sub) return `<span class="check-pill check-missing">${label} Missing</span>`;
      return `<span class="check-pill ${sub.onTime ? 'check-done' : 'check-late'}">${label} ${sub.onTime ? '✓' : '· Late'}</span>`;
    }

    function info(sub) {
      if (!sub) return '';
      return `<span class="check-info">${sub.employee} · ${sub.time}</span>`;
    }

    const flagHtml = d.tempFlags.length > 0 ? `
      <div class="flag-section">
        <div class="flag-label">Temp Flags</div>
        ${d.tempFlags.map(f => `<div class="flag-item"><strong>${f.name}:</strong> ${f.temp}°F</div>`).join('')}
      </div>` : '';

    const correctiveHtml = d.corrective.length > 0 ? `
      <div class="flag-section">
        <div class="flag-label">Corrective Actions</div>
        ${d.corrective.map(c => `<div class="flag-item"><strong>${c.task}:</strong> ${c.note}</div>`).join('')}
      </div>` : '';

    const lateHtml = d.lateReasons.length > 0 ? `
      <div class="late-reason">
        ${d.lateReasons.map(r => `<strong>${r.checklist}:</strong> ${r.reason}`).join('<br>')}
      </div>` : '';

    const photoHtml = d.photos.length > 0 ? `
      <div class="photo-section">
        <div class="photo-label">Photos (${d.photos.length})</div>
        <div class="photo-thumbs">
          ${d.photos.map(p => `<a href="${p.url}" target="_blank"><img class="photo-thumb" src="${p.url}" title="${p.task}" loading="lazy"></a>`).join('')}
        </div>
      </div>` : '';

    return `<div class="location-card ${cardClass}">
      <div class="location-name">${loc}</div>
      <div class="check-row">${pill(d.opening,'Opening')} ${info(d.opening)}</div>
      <div class="check-row">${pill(d.midday,'Midday')} ${info(d.midday)}</div>
      ${flagHtml}
      ${correctiveHtml}
      ${lateHtml}
      ${photoHtml}
    </div>`;
  }).join('');
}
</script>
</body>
</html>
